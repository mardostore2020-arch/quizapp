# ===============================
#   Connexion \u00e0 la base MySQL
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# ===============================
#   JPA / Hibernate
# ===============================
spring.jpa.database-platform=${DB_PLATFORM}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO}

# ===============================
#   Affichage SQL (optionnel)
# ===============================
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL}
spring.sql.init.mode=${SQL_INIT_MODE}

# ===============================
#   Autres param\u00e8tres utiles
# ===============================
spring.application.name=${APP_NAME}
server.port=${SERVER_PORT}