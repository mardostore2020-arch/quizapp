# ===============================
#   Connexion \u00e0 la base MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/quizapp
spring.datasource.username=root
spring.datasource.password=Mardo2025inuka
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
#   JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# ===============================
#   Affichage SQL (optionnel)
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
# ===============================
#   Autres param\u00e8tres utiles
# ===============================
spring.application.name=quizapp
server.port=8080